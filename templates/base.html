<!DOCTYPE html>
<html class="dark" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Karaoke{% endblock %}</title>
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#00f2ff",
                        "secondary": "#3ce36a", 
                        "tertiary": "#ffb950",
                        "background": "#0e0c1f",
                        "surface": "#0e0c1f",
                        "surface-container": "#19172e",
                        "surface-container-low": "#131126",
                        "surface-container-lowest": "#000000",
                        "surface-container-high": "#1f1c36",
                        "surface-container-highest": "#25223e",
                        "on-surface": "#e7e2fe",
                        "on-surface-variant": "#c9c5d0",
                        "outline-variant": "#48455b",
                        "tertiary-container": "#8f43fb",
                        "on-tertiary-container": "#ffffff",
                        "on-primary": "#004343",
                        "error": "#ff6e84"
                    },
                    fontFamily: {
                        "headline": ["Space Grotesk", "sans-serif"],
                        "body": ["Inter", "sans-serif"],
                    },
                    borderRadius: {
                        "DEFAULT": "0.375rem",
                        "lg": "0.5rem", 
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
    
    <!-- Custom Styles -->
    <style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        
        .glass-card {
            background: linear-gradient(135deg, rgba(25, 23, 46, 0.7) 0%, rgba(19, 17, 38, 0.8) 100%);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }
        
        .neon-glow {
            filter: drop-shadow(0 0 10px rgba(0, 242, 255, 0.3));
        }
        
        body {
            background: #0e0c1f;
            color: #e7e2fe;
        }
    </style>
    
    <link rel="stylesheet" href="/static/style.css">
    {% block head %}{% endblock %}
</head>
<body class="bg-background text-on-surface min-h-screen">
    <header class="fixed top-0 left-0 right-0 z-50 glass-card border-b border-outline-variant/20">
        <div class="mx-auto flex w-full max-w-7xl items-center justify-between px-4 py-4 sm:px-6 lg:px-8">
            <div class="flex items-center gap-3">
                <div class="w-8 h-8 rounded-full bg-primary/20 flex items-center justify-center">
                    <span class="material-symbols-outlined text-primary text-lg">{% block header_icon %}music_note{% endblock %}</span>
                </div>
                <div>
                    <h1 class="font-headline font-bold text-lg text-on-surface">{% block header_title %}Karaoke{% endblock %}</h1>
                    <p class="text-xs text-on-surface-variant font-medium">{% block header_subtitle %}Queue Manager{% endblock %}</p>
                </div>
            </div>
            <nav class="flex items-center gap-2">
                <a href="/queue" class="text-primary active:scale-95 transition-transform p-2 hover:bg-primary/10 rounded-full {% if request.url.path.startswith('/queue') or request.url.path == '/' %}bg-primary/10{% endif %}" aria-label="Queue">
                    <span class="material-symbols-outlined">queue_music</span>
                </a>
                <a href="/playback" class="text-primary active:scale-95 transition-transform p-2 hover:bg-primary/10 rounded-full {% if request.url.path.startswith('/playback') %}bg-primary/10{% endif %}" aria-label="TV Display">
                    <span class="material-symbols-outlined">tv</span>
                </a>
                <a href="/settings" class="text-primary active:scale-95 transition-transform p-2 hover:bg-primary/10 rounded-full {% if request.url.path.startswith('/settings') %}bg-primary/10{% endif %}" aria-label="Settings">
                    <span class="material-symbols-outlined">settings</span>
                </a>
            </nav>
        </div>
    </header>
    {% block content %}{% endblock %}
    {% block scripts %}{% endblock %}
</body>
</html>
